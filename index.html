<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>AI Smart Accident Monitoring & Emergency Response System</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f7fb;
}

/* HEADER */

header{
    background:#1e3a8a;
    color:white;
    text-align:center;
    padding:15px;
}

/* HERO */

.hero{
    height:260px;

    background:
    linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.6)),
    url('https://images.unsplash.com/photo-1503376780353-7e6692767b70')
    center/cover;

    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background:rgba(0,0,0,0.75);
    color:white;
    padding:25px;
    border-radius:12px;
    text-align:center;
}

/* BUTTONS */

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    color:white;
    font-weight:bold;
}

.accidentBtn{
    background:red;
}

.emergencyBtn{
    background:#2563eb;
}

/* DASHBOARD */

.dashboard{
    display:flex;
    justify-content:space-around;
    flex-wrap:wrap;
    gap:10px;
    padding:20px;
    background:white;
}

.card{
    background:#1e3a8a;
    color:white;
    padding:15px;
    border-radius:10px;
    width:18%;
    min-width:150px;
    text-align:center;
}

/* MAP */

#map{
    height:420px;
}

/* CAMERA */

#camLabel{
    position:fixed;
    top:10px;
    left:20px;
    background:black;
    color:white;
    padding:5px 10px;
    border-radius:5px;
    z-index:2;
}

video{
    position:fixed;
    top:40px;
    left:20px;
    width:180px;
    border-radius:10px;
    border:3px solid white;
    z-index:1;
}

/* SMS ALERT */

#sms{
    position:fixed;
    top:20px;
    right:20px;
    background:black;
    color:#00ff00;
    padding:15px;
    border-radius:10px;
    display:none;
    width:280px;
    z-index:9999;
    box-shadow:0 0 15px red;
}

/* CHATBOT */

#chatbox{
    position:fixed;
    bottom:20px;
    right:20px;
    width:340px;
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.4);
    z-index:9999;
}

.chat-header{
    background:#1e3a8a;
    color:white;
    padding:12px;
    font-weight:bold;
}

#chat{
    height:240px;
    overflow-y:auto;
    padding:10px;
    background:#f9f9f9;
}

.chat-input{
    display:flex;
    border-top:1px solid #ccc;
}

.chat-input input{
    flex:1;
    padding:10px;
    border:none;
    outline:none;
}

.chat-input button{
    width:80px;
    border-radius:0;
    background:#1e3a8a;
}

</style>
</head>

<body>

<header>
<h2>🚑 AI Smart Accident Monitoring & Emergency Response System</h2>
</header>

<!-- CAMERA -->

<div id="camLabel">📷 AI Camera</div>

<video id="cam" autoplay muted></video>

<!-- HERO -->

<div class="hero">

<div class="box">

<h2 id="status">🟢 System Normal</h2>

<button class="accidentBtn"
onclick="simulateAccident()">
💥 Simulate Accident
</button>

<button class="emergencyBtn"
onclick="startEmergency()">
🚨 Emergency
</button>

</div>

</div>

<!-- DASHBOARD -->

<div class="dashboard">

<div class="card">
<h3>🚨 Accidents</h3>
<p id="accidents">0</p>
</div>

<div class="card">
<h3>🚑 Ambulance</h3>
<p id="ambulance">Idle</p>
</div>

<div class="card">
<h3>🔥 Fire Brigade</h3>
<p id="fire">Idle</p>
</div>

<div class="card">
<h3>📍 Location</h3>
<p id="location">Not tracked</p>
</div>

<div class="card">
<h3>📩 Alerts</h3>
<p id="alerts">0</p>
</div>

</div>

<!-- MAP -->

<div id="map"></div>

<!-- SMS -->

<div id="sms"></div>

<!-- CHATBOT -->

<div id="chatbox">

<div class="chat-header">
🤖 AI Emergency Assistant
</div>

<div id="chat"></div>

<div class="chat-input">

<input
id="input"
type="text"
placeholder="Ask about fire, ambulance, police..."
>

<button onclick="sendMsg()">
Send
</button>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* MAP */

let map = L.map('map')
.setView([12.9716,77.5946],13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

let accidentCount = 0;
let alertCount = 0;

/* CAMERA */

navigator.mediaDevices.getUserMedia({
    video:true
})
.then(stream=>{
    document.getElementById("cam").srcObject = stream;
});

/* STATUS */

function statusAdd(text){

    document.getElementById("status").innerHTML +=
    "<br>" + text;
}

/* ACCIDENT */

function simulateAccident(){

    accidentCount++;

    document.getElementById("accidents").innerText =
    accidentCount;

    document.getElementById("status").innerHTML =
    "💥 Accident Detected";

    setTimeout(()=>{
        statusAdd("🤖 AI analyzing accident...");
    },1000);

    setTimeout(()=>{
        statusAdd("🔥 Vehicle Fire Detected");
    },2000);

    setTimeout(()=>{
        statusAdd("📍 Tracking location...");
    },3000);

    setTimeout(()=>{
        handleLocation(true);
    },4000);

    setTimeout(()=>{
        document.getElementById("ambulance").innerText =
        "Dispatched 🚑";
    },5000);

    setTimeout(()=>{
        document.getElementById("fire").innerText =
        "Dispatched 🔥";
    },5500);

    setTimeout(()=>{
        statusAdd("📩 Alerts sent to Ambulance & Fire Brigade");
    },6500);

    /* VOICE ALERT */

    let speech =
    new SpeechSynthesisUtterance(
    "Accident detected. Ambulance and Fire Brigade dispatched."
    );

    speechSynthesis.speak(speech);
}

/* EMERGENCY */

function startEmergency(){

    document.getElementById("status").innerHTML =
    "🚨 Emergency Activated";

    setTimeout(()=>{
        statusAdd("📍 Getting location...");
    },1000);

    setTimeout(()=>{
        statusAdd("📡 Location detected");
    },2000);

    setTimeout(()=>{
        handleLocation(false);
    },3000);

    setTimeout(()=>{
        statusAdd("🏥 Hospital found");
    },4000);

    setTimeout(()=>{
        statusAdd("🗺 Route shown");
    },5000);
}

/* LOCATION */

function handleLocation(isAccident){

navigator.geolocation.getCurrentPosition(pos=>{

    let lat = pos.coords.latitude;
    let lng = pos.coords.longitude;

    document.getElementById("location").innerText =
    lat.toFixed(3)+","+lng.toFixed(3);

    map.setView([lat,lng],14);

    /* ACCIDENT LOCATION */

    L.marker([lat,lng])
    .addTo(map)
    .bindPopup("💥 Accident Location")
    .openPopup();

    /* HOSPITAL */

    let hLat = lat + 0.01;
    let hLng = lng + 0.01;

    L.marker([hLat,hLng])
    .addTo(map)
    .bindPopup("🏥 Hospital");

    /* FIRE BRIGADE */

    let fLat = lat - 0.01;
    let fLng = lng - 0.01;

    L.marker([fLat,fLng])
    .addTo(map)
    .bindPopup("🔥 Fire Brigade");

    /* ROUTES */

    L.polyline(
    [[lat,lng],[hLat,hLng]],
    {color:'red'}
    ).addTo(map);

    L.polyline(
    [[fLat,fLng],[lat,lng]],
    {color:'orange'}
    ).addTo(map);

    if(isAccident){
        showSMS(lat,lng);
    }

});

}

/* SMS ALERT */

function showSMS(lat,lng){

    alertCount++;

    document.getElementById("alerts").innerText =
    alertCount;

    let sms =
    document.getElementById("sms");

    sms.style.display = "block";

    sms.innerHTML =

    "📩 Emergency Alert Sent<br><br>" +

    "🚑 Ambulance Alert Sent → 108<br>" +

    "🔥 Fire Brigade Alert Sent → 101<br>" +

    "👮 Police Alert Sent → 100<br><br>" +

    "📍 Location:<br>" +

    lat.toFixed(4) + "," + lng.toFixed(4);

    setTimeout(()=>{
        sms.style.display = "none";
    },5000);
}

/* CHATBOT */

function sendMsg(){

    let input =
    document.getElementById("input");

    if(input.value.trim()==="") return;

    let chat =
    document.getElementById("chat");

    chat.innerHTML +=
    "<p><b>You:</b> " +
    input.value +
    "</p>";

    let reply =
    getAIReply(input.value);

    setTimeout(()=>{

        chat.innerHTML +=
        "<p><b>Bot:</b> " +
        reply +
        "</p>";

        chat.scrollTop =
        chat.scrollHeight;

    },500);

    input.value="";
}

/* AI CHATBOT */

function getAIReply(msg){

    msg = msg.toLowerCase();

    /* GREETING */

    if(msg.includes("hi") || msg.includes("hello")){
        return "👋 Hello! I am your AI Emergency Assistant.";
    }

    /* FIRE */

    if(
        msg.includes("fire") ||
        msg.includes("brigade") ||
        msg.includes("101")
    ){
        return "🔥 Fire Brigade Emergency Number: 101";
    }

    /* AMBULANCE */

    if(
        msg.includes("ambulance") ||
        msg.includes("108")
    ){
        return "🚑 Ambulance Emergency Number: 108";
    }

    /* POLICE */

    if(
        msg.includes("police") ||
        msg.includes("100")
    ){
        return "👮 Police Emergency Number: 100";
    }

    /* HELP */

    if(msg.includes("help")){
        return `
        🆘 Emergency Numbers:<br><br>

        🚑 Ambulance → 108<br>

        🔥 Fire Brigade → 101<br>

        👮 Police → 100
        `;
    }

    /* ACCIDENT */

    if(msg.includes("accident")){
        return `
        🚨 Accident detected.<br><br>

        🚑 Ambulance dispatched.<br>

        🔥 Fire Brigade dispatched.
        `;
    }

    /* HOSPITAL */

    if(msg.includes("hospital")){
        return "🏥 Nearby hospital route displayed.";
    }

    /* LOCATION */

    if(msg.includes("location")){
        return "📍 GPS tracking is active.";
    }

    /* CPR */

    if(msg.includes("cpr")){
        return `
        ❤️ CPR Steps:<br><br>

        1️⃣ Check breathing<br>

        2️⃣ Call emergency<br>

        3️⃣ Push hard and fast in center of chest
        `;
    }

    /* FIRST AID */

    if(msg.includes("first aid")){
        return `
        🩹 First Aid Tips:<br><br>

        ✔ Stop bleeding<br>

        ✔ Keep patient calm<br>

        ✔ Call emergency services
        `;
    }

    /* FIRE EXTINGUISHER */

    if(msg.includes("extinguisher")){
        return `
        🧯 PASS Method:<br><br>

        P → Pull pin<br>

        A → Aim nozzle<br>

        S → Squeeze handle<br>

        S → Sweep side to side
        `;
    }

    /* DEFAULT */

    return `
    🤖 Ask me about:<br><br>

    🚑 Ambulance Number<br>

    🔥 Fire Brigade Number<br>

    👮 Police Number<br>

    🚨 Accident<br>

    🏥 Hospital<br>

    ❤️ CPR<br>

    🩹 First Aid
    `;
}

</script>

</body>
</html>
