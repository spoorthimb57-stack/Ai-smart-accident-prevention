
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Smart Accident Monitoring & Emergency Response System</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;background:#f4f7fb;}
header{background:#1e3a8a;color:white;text-align:center;padding:15px;}

.hero{
  height:250px;
  background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') center/cover;
  display:flex;justify-content:center;align-items:center;
}

.box{
  background:rgba(0,0,0,0.7);
  color:white;padding:20px;border-radius:10px;text-align:center;
}

button{
  padding:10px;margin:5px;border:none;
  border-radius:5px;background:red;color:white;cursor:pointer;
}

.dashboard{display:flex;justify-content:space-around;padding:20px;background:white;}
.card{background:#1e3a8a;color:white;padding:15px;border-radius:10px;width:18%;text-align:center;}

#map{height:400px;}

video{
  position:fixed;top:40px;left:20px;width:180px;
  border-radius:10px;border:3px solid white;
  z-index:1;
}

#camLabel{
  position:fixed;top:10px;left:20px;background:black;color:white;
  padding:5px 10px;border-radius:5px;z-index:2;
}

#sms{
  position:fixed;top:20px;right:20px;background:black;color:#0f0;
  padding:10px;border-radius:10px;display:none;
}

#chatbox{
  position:fixed;bottom:20px;right:20px;width:320px;
  background:white;border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.3);z-index:9999;
}

#chat{height:200px;overflow-y:auto;padding:10px;background:#f9f9f9;}
</style>
</head>

<body>

<header>
<h2>Smart Accident Monitoring & Emergency Response System</h2>
</header>

<div id="camLabel">📷 AI Camera</div>
<video id="cam" autoplay></video>

<div class="hero">
<div class="box">
<h3 id="status">🟢 System Normal</h3>
<button onclick="simulateAccident()">💥 Simulate Accident</button>
<button onclick="startEmergency()">🚨 Emergency</button>
</div>
</div>

<!-- DASHBOARD -->
<div class="dashboard">
  <div class="card"><h3>🚨 Accidents</h3><p id="accidents">0</p></div>
  <div class="card"><h3>🚑 Ambulance</h3><p id="ambulance">Idle</p></div>
  <div class="card"><h3>📍 Location</h3><p id="location">Not tracked</p></div>
  <div class="card"><h3>❤️ Heart Rate</h3><p id="heart">--</p></div>
  <div class="card"><h3>🩺 BP</h3><p id="bp">--</p></div>
  <div class="card"><h3>⚠️ Status</h3><p id="healthStatus">Normal</p></div>
</div>

<div id="map"></div>
<div id="sms"></div>

<!-- CHATBOT -->
<div id="chatbox">
<div style="background:#1e3a8a;color:white;padding:10px;">🤖 AI Assistant</div>
<div id="chat"></div>

<div style="display:flex;border-top:1px solid #ccc;">
  <input id="input" type="text" placeholder="Type here..."
  style="flex:1;padding:10px;border:none;outline:none;">
  <button onclick="sendMsg()" style="width:80px;background:#1e3a8a;color:white;border:none;">
  Send
  </button>
</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([12.9716,77.5946], 13);
let accidentCount=0;

// MAP
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// CAMERA
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{document.getElementById("cam").srcObject=stream;});

// 💓 HEALTH MONITOR (SIMULATION)
setInterval(()=>{
  let heart = Math.floor(Math.random()*40)+60; // 60–100
  let bpVal = Math.random() > 0.5 ? "Normal" : "High";

  document.getElementById("heart").innerText = heart + " bpm";
  document.getElementById("bp").innerText = bpVal;

  if(heart > 100 || bpVal === "High"){
    document.getElementById("healthStatus").innerText = "⚠️ Risk";
    statusAdd("⚠️ Driver health abnormal!");

    // AUTO EMERGENCY TRIGGER
    startEmergency();
  } else {
    document.getElementById("healthStatus").innerText = "Normal";
  }

},5000);

// SIMULATE
function simulateAccident(){
  accidentCount++;
  document.getElementById("accidents").innerText=accidentCount;

  document.getElementById("status").innerHTML="💥 Accident Detected";
  setTimeout(()=>statusAdd("🤖 AI analyzing..."),1000);
  setTimeout(()=>statusAdd("📍 Tracking location..."),2000);
  setTimeout(()=>handleLocation(true),3000);
}

// EMERGENCY
function startEmergency(){
  document.getElementById("status").innerHTML="🚨 Emergency Activated";
  setTimeout(()=>handleLocation(false),2000);
}

// LOCATION
function handleLocation(isAccident){
  navigator.geolocation.getCurrentPosition(pos=>{
    let lat=pos.coords.latitude;
    let lng=pos.coords.longitude;

    document.getElementById("location").innerText=
    lat.toFixed(3)+","+lng.toFixed(3);

    map.setView([lat,lng],14);
    L.marker([lat,lng]).addTo(map);

    let hLat=lat+0.01, hLng=lng+0.01;
    L.marker([hLat,hLng]).addTo(map).bindPopup("Hospital");

    if(isAccident) showSMS(lat,lng);
  });
}

// SMS
function showSMS(lat,lng){
  let sms=document.getElementById("sms");
  sms.style.display="block";
  sms.innerHTML="📩 Accident Alert<br>"+lat.toFixed(4)+","+lng.toFixed(4);
  setTimeout(()=>sms.style.display="none",4000);
}

// CHATBOT
function sendMsg(){
  let input=document.getElementById("input").value;
  if(input==="") return;

  let chat=document.getElementById("chat");
  chat.innerHTML+="<p><b>You:</b> "+input+"</p>";

  let reply=getAIReply(input);

  setTimeout(()=>{
    chat.innerHTML+="<p><b>Bot:</b> "+reply+"</p>";
    chat.scrollTop=chat.scrollHeight;
  },500);

  document.getElementById("input").value="";
}

// AI BOT
function getAIReply(msg){
  msg = msg.toLowerCase();

  if(msg.includes("health"))
    return "❤️ I monitor heart rate, BP, and detect abnormal conditions.";

  if(msg.includes("hospital")){
    return "🏥 Nearby: City Hospital (9876543210), Apollo (9123456780)";
  }

  return "🤖 Ask about health, hospital, accident!";
}

function statusAdd(text){
  document.getElementById("status").innerHTML+="<br>"+text;
}
</script>

</body>
</html>
