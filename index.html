<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Smart Accident Monitoring & Emergency Response System</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f7fb;
}

header{
    background:#1e3a8a;
    color:white;
    text-align:center;
    padding:15px;
}

.hero{
    height:250px;

    background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70')
    center/cover;

    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background:rgba(0,0,0,0.7);
    color:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

button{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:5px;
    background:red;
    color:white;
    cursor:pointer;
}

.dashboard{
    display:flex;
    justify-content:space-around;
    padding:20px;
    background:white;
    flex-wrap:wrap;
    gap:10px;
}

.card{
    background:#1e3a8a;
    color:white;
    padding:15px;
    border-radius:10px;
    width:18%;
    text-align:center;
    min-width:150px;
}

#map{
    height:400px;
}

video{
    position:fixed;
    top:40px;
    left:20px;
    width:180px;
    border-radius:10px;
    border:3px solid white;
    z-index:1;
}

#camLabel{
    position:fixed;
    top:10px;
    left:20px;
    background:black;
    color:white;
    padding:5px 10px;
    border-radius:5px;
    z-index:2;
}

#sms{
    position:fixed;
    top:20px;
    right:20px;
    background:black;
    color:#0f0;
    padding:15px;
    border-radius:10px;
    display:none;
    z-index:9999;
    width:250px;
    box-shadow:0 0 15px red;
}

#chatbox{
    position:fixed;
    bottom:20px;
    right:20px;
    width:320px;
    background:white;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
    z-index:9999;
}

#chat{
    height:200px;
    overflow-y:auto;
    padding:10px;
    background:#f9f9f9;
}

</style>
</head>

<body>

<header>
<h2>Smart Accident Monitoring & Emergency Response System</h2>
</header>

<div id="camLabel">📷 AI Camera</div>

<video id="cam" autoplay muted></video>

<!-- HERO -->

<div class="hero">

<div class="box">

<h3 id="status">🟢 System Normal</h3>

<button onclick="simulateAccident()">
💥 Simulate Accident
</button>

<button onclick="startEmergency()">
🚨 Emergency
</button>

</div>

</div>

<!-- DASHBOARD -->

<div class="dashboard">

<div class="card">
<h3>🚨 Accidents</h3>
<p id="accidents">0</p>
</div>

<div class="card">
<h3>🚑 Ambulance</h3>
<p id="ambulance">Idle</p>
</div>

<div class="card">
<h3>🔥 Fire Brigade</h3>
<p id="fire">Idle</p>
</div>

<div class="card">
<h3>📍 Location</h3>
<p id="location">Not tracked</p>
</div>

<div class="card">
<h3>📩 Alerts</h3>
<p id="alerts">0</p>
</div>

</div>

<!-- MAP -->

<div id="map"></div>

<!-- SMS -->

<div id="sms"></div>

<!-- CHATBOT -->

<div id="chatbox">

<div style="
background:#1e3a8a;
color:white;
padding:10px;
">
🤖 AI Assistant
</div>

<div id="chat"></div>

<div style="
display:flex;
border-top:1px solid #ccc;
">

<input
id="input"
type="text"
placeholder="Type here..."
style="
flex:1;
padding:10px;
border:none;
outline:none;
">

<button
onclick="sendMsg()"
style="
width:80px;
background:#1e3a8a;
color:white;
border:none;
">
Send
</button>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* MAP */

let map = L.map('map')
.setView([12.9716,77.5946],13);

let accidentCount = 0;
let alertCount = 0;

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

/* CAMERA */

navigator.mediaDevices.getUserMedia({
    video:true
})
.then(stream=>{
    document.getElementById("cam").srcObject = stream;
});

/* STATUS */

function statusAdd(text){
    document.getElementById("status").innerHTML +=
    "<br>" + text;
}

/* SIMULATE ACCIDENT */

function simulateAccident(){

    accidentCount++;

    document.getElementById("accidents").innerText =
    accidentCount;

    document.getElementById("status").innerHTML =
    "💥 Accident Detected";

    setTimeout(()=>{
        statusAdd("🤖 AI analyzing...");
    },1000);

    setTimeout(()=>{
        statusAdd("🔥 Vehicle Fire Detected");
    },2000);

    setTimeout(()=>{
        statusAdd("📍 Tracking location...");
    },3000);

    setTimeout(()=>{
        handleLocation(true);
    },4000);

    setTimeout(()=>{
        document.getElementById("ambulance").innerText =
        "Dispatched 🚑";
    },5000);

    setTimeout(()=>{
        document.getElementById("fire").innerText =
        "Dispatched 🔥";
    },5500);

    setTimeout(()=>{
        statusAdd("📩 Alerts sent to Ambulance & Fire Brigade");
    },6500);
}

/* EMERGENCY */

function startEmergency(){

    document.getElementById("status").innerHTML =
    "🚨 Emergency Activated";

    setTimeout(()=>{
        statusAdd("📍 Getting location...");
    },1000);

    setTimeout(()=>{
        statusAdd("📡 Location detected");
    },2000);

    setTimeout(()=>{
        handleLocation(false);
    },3000);

    setTimeout(()=>{
        statusAdd("🏥 Hospital found");
    },4000);

    setTimeout(()=>{
        statusAdd("🗺 Route shown");
    },5000);
}

/* LOCATION */

function handleLocation(isAccident){

navigator.geolocation.getCurrentPosition(pos=>{

    let lat = pos.coords.latitude;
    let lng = pos.coords.longitude;

    document.getElementById("location").innerText =
    lat.toFixed(3)+","+lng.toFixed(3);

    map.setView([lat,lng],14);

    /* Accident Marker */

    L.marker([lat,lng])
    .addTo(map)
    .bindPopup("💥 Accident Location")
    .openPopup();

    /* Hospital */

    let hLat = lat + 0.01;
    let hLng = lng + 0.01;

    L.marker([hLat,hLng])
    .addTo(map)
    .bindPopup("🏥 Hospital");

    /* Fire Station */

    let fLat = lat - 0.01;
    let fLng = lng - 0.01;

    L.marker([fLat,fLng])
    .addTo(map)
    .bindPopup("🔥 Fire Brigade");

    /* Ambulance Route */

    L.polyline(
    [[lat,lng],[hLat,hLng]],
    {color:'red'}
    ).addTo(map);

    /* Fire Brigade Route */

    L.polyline(
    [[fLat,fLng],[lat,lng]],
    {color:'orange'}
    ).addTo(map);

    if(isAccident){
        showSMS(lat,lng);
    }

});

}

/* SMS ALERT */

function showSMS(lat,lng){

    alertCount++;

    document.getElementById("alerts").innerText =
    alertCount;

    let sms = document.getElementById("sms");

    sms.style.display = "block";

    sms.innerHTML =

    "📩 Emergency Alert Sent<br><br>" +

    "🚑 Ambulance Alert Sent<br>" +

    "🔥 Fire Brigade Alert Sent<br><br>" +

    "📍 Location:<br>" +

    lat.toFixed(4) + "," + lng.toFixed(4);

    setTimeout(()=>{
        sms.style.display = "none";
    },5000);
}

/* CHATBOT */

function sendMsg(){

    let input =
    document.getElementById("input").value;

    if(input.trim()==="") return;

    let chat =
    document.getElementById("chat");

    chat.innerHTML +=
    "<p><b>You:</b> " + input + "</p>";

    let reply = getAIReply(input);

    setTimeout(()=>{

        chat.innerHTML +=
        "<p><b>Bot:</b> " + reply + "</p>";

        chat.scrollTop =
        chat.scrollHeight;

    },500);

    document.getElementById("input").value="";
}

/* AI CHATBOT */

function getAIReply(msg){

    msg = msg.toLowerCase();

    if(msg.includes("hi"))
    return "👋 Hello! AI Assistant Ready.";

    if(msg.includes("accident"))
    return "🚨 Accident detected. Ambulance and fire brigade dispatched.";

    if(msg.includes("fire"))
    return "🔥 Fire brigade activated.";

    if(msg.includes("hospital"))
    return "🏥 Nearest hospital route displayed.";

    if(msg.includes("location"))
    return "📍 GPS tracking active.";

    if(msg.includes("help"))
    return "🆘 Stay calm. Rescue teams are coming.";

    return "🤖 Ask about accident, fire, hospital or emergency.";
}

</script>

</body>
</html>
