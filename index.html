<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Smart Accident Monitoring System</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;background:#f4f7fb;}

header{
  background:#1e3a8a;color:white;text-align:center;padding:15px;
}

.hero{
  height:250px;
  background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') center/cover;
  display:flex;justify-content:center;align-items:center;
}

.box{
  background:rgba(0,0,0,0.7);
  color:white;padding:20px;border-radius:10px;text-align:center;
}

button{
  padding:10px;margin:5px;
  border:none;border-radius:5px;
  background:red;color:white;cursor:pointer;
}

#map{height:400px;}

/* 🔥 CAMERA TOP LEFT */
video{
  position:fixed;
  top:40px;
  left:20px;
  width:180px;
  border-radius:10px;
  border:3px solid white;
  z-index:1000;
}

/* camera label */
#camLabel{
  position:fixed;
  top:10px;
  left:20px;
  background:black;
  color:white;
  padding:5px 10px;
  border-radius:5px;
  z-index:1001;
}

#sms{
  position:fixed;
  top:20px;
  right:20px;
  background:black;color:#0f0;
  padding:10px;border-radius:10px;
  display:none;
}
</style>
</head>

<body>

<header>
<h2>Smart Accident Monitoring & Emergency Response System</h2>
</header>

<!-- CAMERA LABEL -->
<div id="camLabel">📷 AI Camera</div>

<div class="hero">
<div class="box">

<h3 id="status">🟢 System Normal</h3>

<button onclick="simulateAccident()">💥 Simulate Accident</button>
<button onclick="startEmergency()">🚨 Emergency</button>

</div>
</div>

<video id="cam" autoplay></video>

<div id="map"></div>
<div id="sms"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([12.9716,77.5946], 13);

// FREE MAP
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap'
}).addTo(map);

// CAMERA
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
  document.getElementById("cam").srcObject=stream;
})
.catch(()=>{
  document.getElementById("status").innerHTML="❌ Camera blocked";
});

// 💥 SIMULATE ACCIDENT
function simulateAccident(){
  document.getElementById("status").innerHTML =
  "💥 Accident Detected! 🚑 Dispatching help...";

  handleLocation(true);
}

// 🚨 NORMAL EMERGENCY
function startEmergency(){
  document.getElementById("status").innerHTML =
  "🚨 Emergency Mode (No accident)";

  handleLocation(false);
}

// 📍 LOCATION HANDLER
function handleLocation(isAccident){

  document.getElementById("status").innerHTML += "<br>📍 Getting location...";

  navigator.geolocation.getCurrentPosition(pos=>{

    const lat=pos.coords.latitude;
    const lng=pos.coords.longitude;

    map.setView([lat,lng],14);

    L.marker([lat,lng]).addTo(map)
      .bindPopup(isAccident ? "Accident Location" : "Your Location")
      .openPopup();

    // Fake hospital
    const hLat = lat + 0.01;
    const hLng = lng + 0.01;

    L.marker([hLat,hLng]).addTo(map)
      .bindPopup("Hospital");

    // Route line
    L.polyline([[lat,lng],[hLat,hLng]],{color:'red'}).addTo(map);

    if(isAccident){
      showSMS(lat,lng);
      document.getElementById("status").innerHTML +=
      "<br>🚑 Ambulance dispatched!";
    } else {
      document.getElementById("status").innerHTML +=
      "<br>🟢 Assistance route shown";
    }

  },()=>{
    document.getElementById("status").innerHTML="❌ Location blocked";
  });
}

// 📩 SMS
function showSMS(lat,lng){
  let sms=document.getElementById("sms");

  sms.style.display="block";
  sms.innerHTML=
  "📩 SMS SENT<br><br>🚨 Accident Detected<br>📍 "+
  lat.toFixed(4)+","+lng.toFixed(4);

  setTimeout(()=>sms.style.display="none",4000);
}
</script>

</body>
</html>
