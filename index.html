<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Smart Accident System</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#f4f7fb;}

header{
  background:linear-gradient(90deg,#0f172a,#1e3a8a);
  color:white;
  padding:20px;
  text-align:center;
}

.hero{
  height:300px;
  background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1200') center/cover;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

.hero-content{
  background:rgba(0,0,0,0.6);
  padding:20px;
  border-radius:10px;
  text-align:center;
}

.btn{
  background:red;
  color:white;
  padding:10px 20px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

section{
  padding:40px 10%;
}

#map{
  height:400px;
  width:100%;
  border-radius:10px;
}

#sms{
  position:fixed;
  top:20px;
  right:20px;
  background:#111;
  color:#0f0;
  padding:15px;
  border-radius:10px;
  display:none;
}

#hospitalList{
  margin-top:20px;
  background:white;
  padding:15px;
  border-radius:10px;
}

footer{
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<header>
<h1>AI Smart Accident Prevention System</h1>
</header>

<div class="hero">
  <div class="hero-content">
    <h2 id="aiStatus">Smart AI Monitoring</h2>
    <button class="btn" onclick="startEmergency()">🚨 Emergency</button>
    <p id="status"></p>
  </div>
</div>

<section>
<h2>Live Tracking & Ambulance Routing</h2>
<div id="map"></div>

<div id="hospitalList"></div>
</section>

<div id="sms"></div>

<footer>
<p>© 2026 AI Accident System</p>
</footer>

<script>
let map, directionsService, directionsRenderer;

function initMap(){
  const defaultLoc = {lat:12.9716,lng:77.5946};

  map = new google.maps.Map(document.getElementById("map"),{
    zoom:13,
    center:defaultLoc
  });

  directionsService = new google.maps.DirectionsService();
  directionsRenderer = new google.maps.DirectionsRenderer();
  directionsRenderer.setMap(map);
}

// 🚨 EMERGENCY + AI COLLISION DETECTION
function startEmergency(){

  document.getElementById("status").innerHTML="🚑 Getting location...";

  // 🔥 Simulated AI collision detection
  setTimeout(()=>{
    document.getElementById("aiStatus").innerHTML="⚠️ Collision Detected!";
  },2000);

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      (pos)=>{
        const userLoc={
          lat:pos.coords.latitude,
          lng:pos.coords.longitude
        };

        document.getElementById("status").innerHTML="✅ Location detected";

        map.setCenter(userLoc);

        new google.maps.Marker({
          position:userLoc,
          map:map,
          title:"Accident Location"
        });

        findHospitals(userLoc);
        showSMS(userLoc);

      },
      ()=>{
        document.getElementById("status").innerHTML="⚠️ Using default location";
        const fallback={lat:12.9716,lng:77.5946};
        findHospitals(fallback);
      }
    );
  }
}

// 🏥 FIND HOSPITALS (REAL)
function findHospitals(location){

  const service = new google.maps.places.PlacesService(map);

  service.nearbySearch({
    location:location,
    radius:5000,
    type:["hospital"]
  },(results,status)=>{

    if(status !== "OK"){
      document.getElementById("status").innerHTML="❌ Hospital fetch failed";
      return;
    }

    let listHTML = "<h3>Nearby Hospitals:</h3>";

    results.slice(0,5).forEach((place,i)=>{

      new google.maps.Marker({
        position:place.geometry.location,
        map:map,
        icon:"http://maps.google.com/mapfiles/ms/icons/red-dot.png"
      });

      listHTML += `<p>${i+1}. ${place.name}</p>`;
    });

    document.getElementById("hospitalList").innerHTML = listHTML;

    // Route to first hospital
    drawRoute(location,results[0].geometry.location);

    document.getElementById("status").innerHTML =
    "🚑 Routing to: "+results[0].name;
  });
}

// 🚑 ROUTE
function drawRoute(start,end){
  directionsService.route({
    origin:start,
    destination:end,
    travelMode:"DRIVING"
  },(result,status)=>{
    if(status==="OK"){
      directionsRenderer.setDirections(result);
    }
  });
}

// 📩 FAKE SMS ALERT
function showSMS(loc){
  const sms=document.getElementById("sms");
  sms.style.display="block";
  sms.innerHTML=
  "📩 SMS SENT<br><br>🚨 Accident Detected<br>📍 "+
  loc.lat.toFixed(4)+","+loc.lng.toFixed(4);

  setTimeout(()=>sms.style.display="none",5000);
}
</script>

<!-- 🔥 IMPORTANT FIX -->
<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCMeQnjmPRaRlrkJB3FzWJrvhVPmiRGteQ&libraries=places&callback=initMap">
</script>

</body>
</html>
