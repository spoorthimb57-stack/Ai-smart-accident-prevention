<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Smart Accident Monitoring System</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;background:#f4f7fb;}

header{
  background:#1e3a8a;color:white;text-align:center;padding:15px;
}

.hero{
  height:250px;
  background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') center/cover;
  display:flex;justify-content:center;align-items:center;
}

.box{
  background:rgba(0,0,0,0.7);
  color:white;padding:20px;border-radius:10px;text-align:center;
}

button{
  padding:10px;margin:5px;
  border:none;border-radius:5px;
  background:red;color:white;cursor:pointer;
}

/* DASHBOARD */
.dashboard{
  display:flex;
  justify-content:space-around;
  padding:20px;
  background:white;
}

.card{
  background:#1e3a8a;
  color:white;
  padding:15px;
  border-radius:10px;
  width:22%;
  text-align:center;
}

#map{height:400px;}

/* CAMERA */
video{
  position:fixed;
  top:40px;
  left:20px;
  width:180px;
  border-radius:10px;
  border:3px solid white;
  z-index:1000;
}

#camLabel{
  position:fixed;
  top:10px;
  left:20px;
  background:black;
  color:white;
  padding:5px 10px;
  border-radius:5px;
  z-index:1001;
}

/* SMS */
#sms{
  position:fixed;
  top:20px;
  right:20px;
  background:black;color:#0f0;
  padding:10px;border-radius:10px;
  display:none;
}
</style>
</head>

<body>

<header>
<h2>Smart Accident Monitoring & Emergency Response System</h2>
</header>

<div id="camLabel">📷 AI Camera</div>
<video id="cam" autoplay></video>

<div class="hero">
<div class="box">

<h3 id="status">🟢 System Normal (Auto Monitoring ON)</h3>

<button onclick="simulateAccident()">💥 Simulate Accident</button>
<button onclick="startEmergency()">🚨 Emergency</button>

</div>
</div>

<div class="dashboard">
  <div class="card">
    <h3>🚨 Accidents</h3>
    <p id="accidents">0</p>
  </div>
  <div class="card">
    <h3>🚑 Ambulance</h3>
    <p id="ambulance">Idle</p>
  </div>
  <div class="card">
    <h3>📍 Location</h3>
    <p id="location">Not tracked</p>
  </div>
  <div class="card">
    <h3>📩 Alerts</h3>
    <p id="alerts">0</p>
  </div>
</div>

<div id="map"></div>
<div id="sms"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([12.9716,77.5946], 13);
let accidentCount = 0;
let alertCount = 0;

// MAP
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap'
}).addTo(map);

// CAMERA
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
  document.getElementById("cam").srcObject=stream;
});

// 💥 SIMULATION
function simulateAccident(){

  accidentCount++;
  document.getElementById("accidents").innerText = accidentCount;

  document.getElementById("status").innerHTML = "💥 Accident Detected!";

  setTimeout(()=>{
    document.getElementById("status").innerHTML += "<br>🤖 AI analyzing...";
  },1000);

  setTimeout(()=>{
    document.getElementById("status").innerHTML += "<br>📍 Tracking location...";
  },2000);

  setTimeout(()=>{
    handleLocation(true);
  },3000);

  setTimeout(()=>{
    document.getElementById("ambulance").innerText = "Dispatched";
  },4000);

  setTimeout(()=>{
    document.getElementById("status").innerHTML += "<br>📩 SMS sent!";
  },5000);
}

// 🚨 FIXED EMERGENCY FLOW
function startEmergency(){

  document.getElementById("status").innerHTML =
  "🚨 Emergency Mode Activated";

  setTimeout(()=>{
    document.getElementById("status").innerHTML +=
    "<br>📍 Getting location...";
  },1000);

  setTimeout(()=>{
    document.getElementById("status").innerHTML +=
    "<br>📡 Location detected!";
  },2000);

  setTimeout(()=>{
    handleLocation(false);
  },3000);

  setTimeout(()=>{
    document.getElementById("status").innerHTML +=
    "<br>🏥 Nearby hospital found";
  },4000);

  setTimeout(()=>{
    document.getElementById("status").innerHTML +=
    "<br>🗺️ Route displayed successfully!";
  },5000);
}

// 📍 LOCATION + ROUTE
function handleLocation(isAccident){

  navigator.geolocation.getCurrentPosition(pos=>{

    const lat=pos.coords.latitude;
    const lng=pos.coords.longitude;

    document.getElementById("location").innerText =
    lat.toFixed(3)+","+lng.toFixed(3);

    map.setView([lat,lng],14);

    L.marker([lat,lng]).addTo(map)
      .bindPopup(isAccident ? "Accident Location" : "User Location")
      .openPopup();

    const hLat = lat + 0.01;
    const hLng = lng + 0.01;

    L.marker([hLat,hLng]).addTo(map)
      .bindPopup("Hospital");

    L.polyline([[lat,lng],[hLat,hLng]],{color:'red'}).addTo(map);

    if(isAccident){
      showSMS(lat,lng);
    }

  });
}

// 📩 SMS
function showSMS(lat,lng){
  alertCount++;
  document.getElementById("alerts").innerText = alertCount;

  let sms=document.getElementById("sms");
  sms.style.display="block";

  sms.innerHTML =
  "📩 Accident Alert<br>"+lat.toFixed(4)+","+lng.toFixed(4);

  setTimeout(()=>sms.style.display="none",4000);
}
</script>

</body>
</html>
